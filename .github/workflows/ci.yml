name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate marketplace + plugin structure
        run: python3 .github/scripts/validate_plugins.py
      - name: Leak gate (client/PII identifiers)
        run: bash scripts/leak_scan.sh .
